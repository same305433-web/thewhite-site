<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقعي</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("background.jpg");
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* عنوان */
h1 {
    color: white;
    margin-bottom: 20px;
    text-shadow: 0 0 10px black;
}

/* حاوية الأزرار */
.container {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* الأزرار */
.btn {
    width: 250px;
    padding: 15px;
    text-align: center;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 18px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.25);
}

/* زر يوتيوب بنور */
.youtube {
    background: rgba(255,0,0,0.2);
    box-shadow: 0 0 15px red;
}

.youtube:hover {
    box-shadow: 0 0 25px red;
}

/* صورة شخصية */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid white;
    margin-bottom: 15px;
    object-fit: cover;
    box-shadow: 0 0 15px white;
}
</style>

</head>

<body>

<!-- صورة شخصية -->
<img src="profile.jpg" class="profile">

<h1>موقعي الرسمي</h1>

<!-- أزرار -->
<div class="container">

    <a class="btn youtube" href="https://www.youtube.com/@THEWHITE-Gaming" target="_blank">
        🔴 YouTube
    </a>

    <a class="btn" href="https://www.instagram.com/thewhite_gaming/reels/" target="_blank">
        📸 Instagram
    </a>

    <a class="btn" href="https://www.tiktok.com/@thewhite.gaming" target="_blank">
        🎵 TikTok
    </a>
	
	<a class="btn" href="https://discord.gg/UwDMYv45UN" target="_blank">
		discord
    </a>


</div>

<!-- MUSIC LINE PLAYER -->
<div class="music-line">

    <div class="label">🎧 Music</div>

    <button id="playBtn" onclick="toggleMusic()">▶</button>

    <div class="volume-box">
        🔉
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
        🔊
    </div>

    <div class="line">
        <div class="fill" id="fill"></div>
    </div>

</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<style>
.music-line {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);

    width: 65%;
    height: 10px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    font-family: Arial;
}

/* النص */
.label {
    position: absolute;
    top: -25px;
    left: 0;
    color: white;
    font-size: 12px;
    opacity: 0.8;
}

/* زر التشغيل */
#playBtn {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);

    width: 35px;
    height: 35px;

    border-radius: 50%;
    border: none;

    cursor: pointer;

    background: white;
    color: black;

    transition: 0.3s;
}

#playBtn:hover {
    transform: translateX(-50%) scale(1.1);
}

/* الصوت */
.volume-box {
    position: absolute;
    right: -160px;
    top: -20px;

    color: white;
    font-size: 12px;

    display: flex;
    align-items: center;
    gap: 5px;
}

.volume-box input {
    width: 100px;
}

/* الخط الأساسي */
.line {
    width: 100%;
    height: 4px;

    background: rgba(255,255,255,0.2);
    border-radius: 50px;

    overflow: hidden;
}

/* الخط الملون المتحرك */
.fill {
    width: 0%;
    height: 100%;

    border-radius: 50px;

    background: linear-gradient(90deg,
        #00ffe5,
        #ff00f7,
        #ffe600,
        #00ff6a
    );

    background-size: 300% 300%;

    animation: colorMove 4s infinite linear;
    transition: width 0.2s;
}

/* حركة الألوان */
@keyframes colorMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}
</style>

<script>
let music = document.getElementById("bgMusic");
let btn = document.getElementById("playBtn");
let volume = document.getElementById("volume");
let fill = document.getElementById("fill");

let playing = false;

// تشغيل / إيقاف
function toggleMusic() {
    if (!playing) {
        music.play();
        btn.innerHTML = "⏸";
        playing = true;

        animateLine();
    } else {
        music.pause();
        btn.innerHTML = "▶";
        playing = false;
    }
}

// الصوت
volume.addEventListener("input", () => {
    music.volume = volume.value;
});

// حركة الخط (شكل بصري)
function animateLine() {
    let width = 0;

    let interval = setInterval(() => {
        if (!playing) {
            clearInterval(interval);
            return;
        }

        width += 1;
        if (width > 100) width = 0;

        fill.style.width = width + "%";
    }, 200);
}
</script>
